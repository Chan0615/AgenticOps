# AgenticOps Docker Compose 部署配置
#
# 使用方式:
#   1. cp backend/config.yaml.example backend/config.yaml && 编辑填入实际值
#   2. docker compose up -d
#
# 服务说明:
#   - app:      FastAPI 后端 + 前端静态文件
#   - worker:   Celery Worker（任务执行）
#   - beat:     Celery Beat（定时调度）
#   - mysql:    MySQL 主数据库
#   - redis:    Redis 队列 + 缓存
#   - pgvector: PostgreSQL + pgvector 向量数据库
#   - nginx:    反向代理

version: "3.8"

services:
  # ---- MySQL ----
  mysql:
    image: mysql:8.0
    container_name: agenticops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-agenticops123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kefu_ai}
      MYSQL_CHARSET: utf8mb4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: agenticops-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- pgvector ----
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: agenticops-pgvector
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER:-agenticops}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-agenticops123}
      POSTGRES_DB: ${PG_DATABASE:-agenticops_vector}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agenticops" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 后端 API ----
  app:
    build: .
    container_name: agenticops-app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ---- Celery Worker ----
  worker:
    build: .
    container_name: agenticops-worker
    restart: always
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info -Q salt,scheduler

  # ---- Celery Beat ----
  beat:
    build: .
    container_name: agenticops-beat
    restart: always
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A celery_app beat --loglevel=info

  # ---- Nginx ----
  nginx:
    image: nginx:alpine
    container_name: agenticops-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
  redis_data:
  pgvector_data:
  app_uploads:
  app_logs:
