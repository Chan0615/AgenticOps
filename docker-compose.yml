# AgenticOps Docker Compose - 应用模式（默认）
#
# 只部署应用服务（app/worker/beat/nginx），使用外部已有的 MySQL/Redis/pgvector
#
# 使用方式:
#   1. cp backend/config.yaml.example backend/config.yaml && 编辑填入外部数据库真实 IP
#   2. docker compose up -d --build
#
# 注意: config.yaml 中数据库 host 必须填外部真实 IP，不能用 localhost

version: "3.8"

services:
  # ---- 后端 API ----
  app:
    build: .
    container_name: agenticops-app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - app_uploads:/app/uploads
      - app_logs:/app/logs
      - app_static:/app/static
    # CMD in Dockerfile: copy frontend dist to shared volume, then start uvicorn

  # ---- Celery Worker ----
  worker:
    build: .
    container_name: agenticops-worker
    restart: always
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    command: celery -A celery_app worker --loglevel=info -Q salt,scheduler

  # ---- Celery Beat ----
  beat:
    build: .
    container_name: agenticops-beat
    restart: always
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
    command: celery -A celery_app beat --loglevel=info

  # ---- Nginx ----
  nginx:
    image: nginx:alpine
    container_name: agenticops-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-9080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_static:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  app_uploads:
  app_logs:
  app_static:
