# AgenticOps Docker Compose - 全量模式
#
# 全部服务在 Docker 内运行，包括 MySQL/Redis/pgvector
# 适用于全新服务器，什么都没有的情况
#
# 使用方式:
#   1. cp backend/config.yaml.example backend/config.yaml
#   2. 编辑 config.yaml，数据库 host 填容器名（mysql / redis / pgvector）
#   3. docker compose -f docker-compose.full.yml up -d --build
#   4. docker compose -f docker-compose.full.yml exec app python init_db.py
#   5. docker compose -f docker-compose.full.yml exec app python init_pgvector.py

version: "3.8"

services:
  # ---- MySQL ----
  mysql:
    image: mysql:8.0
    container_name: agenticops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-agenticops123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kefu_ai}
      MYSQL_CHARSET: utf8mb4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: agenticops-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- pgvector ----
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: agenticops-pgvector
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER:-agenticops}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-agenticops123}
      POSTGRES_DB: ${PG_DATABASE:-agenticops_vector}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 后端 API ----
  app:
    build: .
    container_name: agenticops-app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - app_uploads:/app/uploads
      - app_logs:/app/logs
      - app_static:/app/static
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    # CMD in Dockerfile: copy frontend dist to shared volume, then start uvicorn

  # ---- Celery Worker ----
  worker:
    build: .
    container_name: agenticops-worker
    restart: always
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info -Q salt,scheduler

  # ---- Celery Beat ----
  beat:
    build: .
    container_name: agenticops-beat
    restart: always
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A celery_app beat --loglevel=info

  # ---- Nginx ----
  nginx:
    image: nginx:alpine
    container_name: agenticops-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-9080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_static:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  mysql_data:
  redis_data:
  pgvector_data:
  app_uploads:
  app_logs:
  app_static:
